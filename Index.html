<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Digital</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; padding: 20px; }
        .item { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 10px 0; }
        .seccion { font-weight: bold; font-size: 1.4em; margin-top: 30px; color: #d35400; border-bottom: 2px solid; }
        .precio { font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>
    <div id="menu">Cargando menú...</div>

    <script>
        fetch('menu.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('menu');
                container.innerHTML = '';
                data.forEach(item => {
                    if (item.seccion) {
                        container.innerHTML += `<div class="seccion">${item.seccion}</div>`;
                    } else {
                        container.innerHTML += `
                            <div class="item">
                                <span>${item.nombre}</span>
                                <span class="precio">${item.precio}</span>
                            </div>`;
                    }
                });
            });
    </script>
</body>
</html>
