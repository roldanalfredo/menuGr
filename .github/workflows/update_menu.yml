name: Actualizar Menu desde PDF
on:
  push:
    paths:
      - 'carta.pdf'
      - 'extraer.py'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pdfplumber

      - name: Extraer datos
        run: |
          # Esto nos asegura que estamos en la carpeta correcta
          python extraer.py

      - name: Hacer commit del JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Agregamos el archivo si existe, si no, no falla
          if [ -f menu.json ]; then
            git add menu.json
            git commit -m "Update menu.json from PDF" || echo "No hay cambios"
            git push || echo "No hay nada para pushear"
          else
            echo "Error: menu.json no fue generado"
            exit 1
          fi