name: Actualizar Menu desde PDF
on:
  push:
    paths:
      - 'carta.pdf'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4  # <--- Actualizado de v3 a v4

      - name: Configurar Python
        uses: actions/setup-python@v5  # <--- Actualizado de v4 a v5
        with:
          python-version: '3.11' # Versión más moderna y estable para 2026

      - name: Instalar dependencias
        run: pip install pdfplumber

      - name: Extraer datos
        run: python extraer.py

      - name: Hacer commit del JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add menu.json
          git commit -m "Update menu.json from PDF" || exit 0
          git push